<!doctype html>
<html lang="id">
    <head>
        <title>My Todos</title>
        <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    </head>
    <body class="bg-gray-50 min-h-screen p-8">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Daftar Tugas</h1>
                <form action="/logout" method="POST">
                    <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />
                    <button
                        class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"
                    >
                        Logout
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow mb-6">
                <form action="/todos" method="POST" class="flex gap-2">
                    <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />
                    <input
                        type="text"
                        name="title"
                        placeholder="Apa yang ingin dikerjakan?"
                        class="flex-1 border border-gray-300 p-2 rounded"
                        required
                    />
                    <button
                        type="submit"
                        class="bg-green-500 text-white px-6 py-2 rounded font-semibold hover:bg-green-600"
                    >
                        Tambah
                    </button>
                </form>
            </div>

            <div class="space-y-3">
                {{range .Todos}}
                <div
                    class="bg-white p-4 rounded shadow flex justify-between items-center group"
                >
                    <span class="text-lg">{{.Title}}</span>
                    <form action="/todos/delete/{{.ID}}" method="POST">
                        <input
                            type="hidden"
                            name="_csrf"
                            value="{{$.CSRFToken}}"
                        />
                        <button class="text-red-400 hover:text-red-600">
                            Hapus
                        </button>
                    </form>
                </div>
                {{else}}
                <p class="text-center text-gray-500">Belum ada tugas.</p>
                {{end}}
            </div>
        </div>
    </body>
</html>
