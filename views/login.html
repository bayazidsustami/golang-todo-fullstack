<!doctype html>
<html lang="id">
    <head>
        <title>Login</title>
        <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
        <style>
            @keyframes fadeOut {
                0% {
                    opacity: 1;
                    transform: translateY(0);
                }
                80% {
                    opacity: 1;
                    transform: translateY(0);
                }
                100% {
                    opacity: 0;
                    transform: translateY(20px);
                    pointer-events: none;
                }
            }
            .toast-animate {
                animation: fadeOut 4s forwards;
            }
        </style>
    </head>
    <body class="bg-gray-100 flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded shadow-md w-96">
            <h1 class="text-2xl font-bold mb-4 text-center">Login</h1>
            <form action="/login" method="POST" class="space-y-4">
                <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    class="w-full border p-2 rounded"
                    required
                />
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    class="w-full border p-2 rounded"
                    required
                />
                <button
                    type="submit"
                    class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600"
                >
                    Masuk
                </button>
            </form>
            <p class="mt-4 text-center">
                Belum punya akun?
                <a href="/register" class="text-blue-500">Daftar</a>
            </p>
        </div>
        {{if .Error}}
        <div
            id="toast"
            class="toast-animate fixed bottom-5 right-5 bg-red-500 text-white px-6 py-3 rounded shadow-lg flex items-center gap-3"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                />
            </svg>

            <span>{{ .Error }}</span>

            <button
                onclick="this.parentElement.remove()"
                class="ml-4 hover:text-gray-200 font-bold"
            >
                ✕
            </button>
        </div>
        {{end}}
    </body>
</html>
